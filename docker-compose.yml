services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: virement-backend
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: virement-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped
